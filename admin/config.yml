backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/uniens-website   # ← GitHub 사용자명/레포명으로 변경하세요
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "제품 관리"
    folder: "_products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "제품명 (국문)", name: "name_ko", widget: "string" }
      - { label: "제품명 (영문)", name: "name_en", widget: "string" }
      - label: "카테고리"
        name: "category"
        widget: "select"
        options:
          - { label: "수술용 기기", value: "surgical" }
          - { label: "진단 장비",   value: "diagnostic" }
          - { label: "소모성 의료용품", value: "consumable" }
      - { label: "제품 이미지", name: "image", widget: "image" }
      - { label: "간략 설명", name: "description", widget: "text" }
      - { label: "의료보험", name: "insurance", widget: "string", required: false }
      - { label: "허가번호", name: "approval_number", widget: "string", required: false }
      - { label: "카탈로그 PDF URL", name: "catalog_url", widget: "string", required: false }
      - { label: "상세 페이지 URL", name: "detail_url", widget: "string", required: false }
      - { label: "공개", name: "published", widget: "boolean", default: true }
