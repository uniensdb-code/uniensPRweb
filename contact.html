<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의하기 | UNIENS 유엔아이엔스</title>
  <meta name="description" content="주식회사 유엔아이엔스로 오시는 길과 연락처를 안내해 드립니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: start;
  }
  @media (max-width: 960px) {
    .contact-grid { grid-template-columns: 1fr; gap: 48px; }
  }
  .contact-info-box h3 {
    font-size: .88rem !important; font-weight: 800 !important;
    color: var(--color-primary) !important;
    letter-spacing: .06em; text-transform: uppercase; margin-bottom: 24px;
  }
  .contact-item {
    display: flex; gap: 16px;
    padding: 16px 0; border-bottom: 1px solid var(--color-border);
  }
  .contact-item:last-of-type { border-bottom: none; }
  .contact-item__icon {
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--color-accent-lt);
    border: 1px solid #C2D8F0;
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
  }
  .contact-item__body { display: flex; flex-direction: column; gap: 3px; }
  .contact-item__label {
    font-size: .72rem !important; font-weight: 800 !important;
    color: var(--color-accent) !important; letter-spacing: .08em; text-transform: uppercase;
  }
  .contact-item__value {
    font-size: .9rem !important; color: var(--color-text) !important;
    font-weight: 500 !important; line-height: 1.6;
  }
  .map-wrap { margin-top: 0; }
  .map-wrap h3 {
    font-size: .88rem !important; font-weight: 800 !important;
    color: var(--color-primary) !important;
    letter-spacing: .06em; text-transform: uppercase; margin-bottom: 16px;
  }
  .map-embed { width: 100%; border: 1px solid #ccc; }
  .map-caption { font-size: .8rem; color: #888; margin-top: 6px; }
  </style>
</head>
<body>
<div class="layout-wrap">

  <div id="layout-header"></div>

  <main id="layout-main">

    <!-- PAGE HERO -->
    <section class="page-hero">
      <div class="container">
        <span class="page-hero__eyebrow">Contact Us</span>
        <h1 class="page-hero__title">문의하기</h1>
        <p class="page-hero__desc">주식회사 유엔아이엔스로 오시는 길과 연락처를 안내해 드립니다.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="contact-grid">

          <!-- 왼쪽: 연락처 -->
          <div>
            <div class="contact-info-box">
              <h3>연락처 안내</h3>

              <div class="contact-item">
                <div class="contact-item__icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A5FA8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.84a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/>
                  </svg>
                </div>
                <div class="contact-item__body">
                  <span class="contact-item__label">전화</span>
                  <span class="contact-item__value">02-402-6341</span>
                </div>
              </div>

              <div class="contact-item">
                <div class="contact-item__icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A5FA8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
                    <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
                  </svg>
                </div>
                <div class="contact-item__body">
                  <span class="contact-item__label">팩스</span>
                  <span class="contact-item__value">02-402-6342</span>
                </div>
              </div>

              <div class="contact-item">
                <div class="contact-item__icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A5FA8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                  </svg>
                </div>
                <div class="contact-item__body">
                  <span class="contact-item__label">이메일</span>
                  <span class="contact-item__value">uni0001@unipharm.co.kr</span>
                </div>
              </div>

              <div class="contact-item">
                <div class="contact-item__icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A5FA8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                  </svg>
                </div>
                <div class="contact-item__body">
                  <span class="contact-item__label">운영시간</span>
                  <span class="contact-item__value">
                    평일 09:00 – 18:00<br>
                    <span style="font-size:.8rem;color:var(--color-muted);">점심 12:00 – 13:00 / 주말·공휴일 휴무</span>
                  </span>
                </div>
              </div>

              <div class="contact-item">
                <div class="contact-item__icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A5FA8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                  </svg>
                </div>
                <div class="contact-item__body">
                  <span class="contact-item__label">주소</span>
                  <span class="contact-item__value">서울특별시 송파구 중대로 269-1, 5층<br>(오금동, 송원빌딩)</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 오른쪽: 지도 -->
          <div class="map-wrap">
            <h3>오시는 길</h3>
            <a href="https://map.kakao.com/?urlX=528901&urlY=1112691&urlLevel=2&map_type=TYPE_MAP&map_hybrid=false" target="_blank">
              <img class="map-embed" src="https://staticmap.kakao.com/map/mapservice?FORMAT=PNG&SCALE=1.25&MX=528900&MY=1112691&S=0&IW=504&IH=310&LANG=0&COORDSTM=WCONGNAMUL&logo=kakao_logo" alt="지도">
            </a>
            <p class="map-caption">서울특별시 송파구 중대로 269-1 5층 (클릭하면 카카오맵으로 이동)</p>
          </div>

        </div>
      </div>
    </section>

  </main>

  <div id="layout-footer"></div>

</div>

<script src="/js/components.js"></script>
<script src="/js/main.js"></script>
<script>initPage('contact');</script>
</body>
</html>
